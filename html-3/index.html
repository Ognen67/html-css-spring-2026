<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="icon" href="favicon.ico">
</head>

<body style="height: 2000px; background-color: lightblue; font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">

    <h2>Register Form</h2>
    <form action="">
        <label for="">Full Name</label>
        <br>
        <input name="fullName" type="text" required minlength="10">
        <br>
        <label for="">Email</label>
        <br>
        <input name="email" type="email" required>
        <br>
        <label for="">Password</label>
        <br>
        <input name="password" type="password" required minlength="8">
        <br>
        <br>
        <button type="submit">Register</button>
    </form>

    <br>
    <hr>

    <fieldset>
        <legend>Register Form</legend>
        <label>Text</label>
        <br>
        <input type="text">
        <br>
        <label>Number</label>
        <br>
        <input type="number">
        <br>
        <label>Email</label>
        <br>
        <input type="email">
        <br>
        <label>Password</label>
        <br>
    </fieldset>

    <br>
    <input type="password">
    <br>
    <label for="">Date</label>
    <br>
    <input type="date">
    <br>
    <label for="">Datetime local</label>
    <br>
    <input type="datetime-local">
    <br>
    <label for="">Datetime local</label>
    <br>
    <input type="time">
    <br>
    <label for="">Range</label>
    <br>
    <input type="range" step="10">
    <br>
    <label for="">Color</label>
    <br>
    <input type="color">
    <br>
    <label for="">URL</label>
    <br>
    <input type="url">
    <br>
    <label for="">Checkbox</label>
    <br>
    <input type="checkbox" name="choice1">
    <input type="checkbox" name="choice1">
    <input type="checkbox" name="choice1">
    <input type="checkbox" name="choice1">
    <br>
    <label for="">Radiobox</label>
    <br>
    <label for="sauce_ketchup">Ketchup</label><input id="sauce_ketchup" type="radio" name="sauce" value="ketchup">
    <label for="sauce_mayonnaise">Mayonnaise</label><input id="sauce_mayonnaise" type="radio" name="sauce"
        value="mayonnaise">
    <label for="sauce_mustard">Mustard</label><input id="sauce_mustard" type="radio" name="sauce" value="mustard">
    <label for="sauce_bbq">Bbq</label><input id="sauce_bbq" type="radio" name="sauce" value="bbq">

    <br>
    <label for="">Textarea</label>
    <br>
    <textarea name="" id="" minlength="10" rows="4" cols="40"></textarea>

    <br>

    <br>
    <select name="" id="">
        <option value="1980">1980</option>
        <option value="1981">1981</option>
        <option value="1982">1982</option>
    </select>

    <br>
    <br>
    <input type="file" accept="image/png">



</body>

</html>
